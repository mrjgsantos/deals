name: Amazon Discovery

on:
  schedule:
    # Runs once per day at 06:00 UTC — two hours before the hourly
    # ingestion pipeline starts at 08:00.  Newly discovered ASINs will
    # have at least one Keepa observation by the time scoring runs.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  amazon-discovery:
    name: Discover Amazon.es ASINs and ingest via Keepa
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POSTGRES_SERVER: ${{ secrets.POSTGRES_SERVER }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
      AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Discover Amazon.es ASINs and ingest via Keepa
        run: python -m app.jobs.daily_amazon_discovery
