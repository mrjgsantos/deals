name: Daily Pipeline

on:
  schedule:
    - cron: "0 8-22 * * *"
  workflow_dispatch: {}

jobs:
  run-daily:
    name: Run daily ingestion + scoring + auto-publish + AI drafts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      POSTGRES_SERVER: ${{ secrets.POSTGRES_SERVER }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}
      AI_COPY_MODEL_NAME: ${{ secrets.AI_COPY_MODEL_NAME }}
      SERPAPI_ENGINE: ${{ secrets.SERPAPI_ENGINE }}
      SERPAPI_COUNTRY: ${{ secrets.SERPAPI_COUNTRY }}
      SERPAPI_LANGUAGE: ${{ secrets.SERPAPI_LANGUAGE }}
      SERPAPI_LOCATION: ${{ secrets.SERPAPI_LOCATION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Run daily pipeline (with Amazon discovery + ingestion)
        run: python -m app.jobs.run_daily --include-amazon-discovery --include-ingestion