name: Daily Pipeline

on:
  schedule:
    # Every hour from 08:00 to 22:00 UTC, every day.
    - cron: "0 8-22 * * *"
  workflow_dispatch: {}  # allow manual trigger from the Actions UI

jobs:
  run-daily:
    name: Run daily ingestion + scoring + auto-publish + AI drafts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      POSTGRES_SERVER: ${{ secrets.POSTGRES_SERVER }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}
      AI_COPY_MODEL_NAME: ${{ secrets.AI_COPY_MODEL_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline (with ingestion)
        run: python -m app.jobs.run_daily --include-ingestion
